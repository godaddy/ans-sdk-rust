# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check
# Run specific check: cargo deny check licenses

[graph]
all-features = true

# ── Advisories ─────────────────────────────────────────────────────────
# Checks for known security vulnerabilities in dependencies.
[advisories]
# Check all crates (not just workspace members)
unmaintained = "workspace"
ignore = []

# ── Licenses ───────────────────────────────────────────────────────────
# Ensures all dependency licenses are acceptable for an MIT-licensed SDK.
[licenses]
confidence-threshold = 0.8

allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# LGPL is copyleft but acceptable for transitive dependencies in a library
# context. r-efi is a UEFI specification crate pulled by getrandom — it's
# only compiled on UEFI targets.
[[licenses.exceptions]]
allow = ["LGPL-2.1-or-later"]
name = "r-efi"

[licenses.private]
ignore = false

# ── Bans ───────────────────────────────────────────────────────────────
# Prevents pulling in undesirable crates.
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

deny = [
    # OpenSSL — this SDK uses rustls exclusively
    { name = "openssl-sys", wrappers = [] },
    { name = "openssl", wrappers = [] },
]

# ── Sources ────────────────────────────────────────────────────────────
# Ensures dependencies come from trusted registries.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
